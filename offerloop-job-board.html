// ─── FindPeoplePanel ───────────────────────────────────────────────────────────
function FindPeoplePanel({
  userPlan       = 'free',
  currentCredits = 210,
  onUpgradeClick = () => {},
  onCreditsSpent = () => {},
}) {
  const isPremium = userPlan === 'premium';
  const defaultCounts = { 'hiring-manager': isPremium ? 1 : 0, 'recruiter': 2, 'employee': 2 };
  const [phase, setPhase]                     = useState('configure');
  const [counts, setCounts]                   = useState(defaultCounts);
  const [confirmedCounts, setConfirmedCounts] = useState(null);
  const [activeTab, setActiveTab]             = useState('all');
  const loadTimer = useRef(null);
  useEffect(() => () => clearTimeout(loadTimer.current), []);

  const totalPeople  = ROLES.reduce((s,r) => s + counts[r.key], 0);
  const totalCredits = ROLES.reduce((s,r) => s + r.credits * counts[r.key], 0);
  const atMax        = totalPeople >= 10;
  const freeHasHM    = !isPremium && counts['hiring-manager'] > 0;
  const notEnough    = !freeHasHM && totalCredits > 0 && currentCredits < totalCredits;
  const ctaDisabled  = totalPeople === 0 || notEnough;

  function adjustCount(key, delta) {
    setCounts(prev => {
      const next = Math.max(0, Math.min(5, prev[key] + delta));
      const newTotal = Object.entries(prev).reduce((s,[k,v]) => s + (k===key ? next : v), 0);
      if (newTotal > 10) return prev;
      return { ...prev, [key]: next };
    });
  }
  function handleFind() {
    if (freeHasHM) { onUpgradeClick(); return; }
    const snap = { ...counts };
    setConfirmedCounts(snap);
    setPhase('loading');
    onCreditsSpent(totalCredits);
    loadTimer.current = setTimeout(() => { setPhase('results'); setActiveTab('all'); }, 1500);
  }
  function handleSearchAgain() {
    clearTimeout(loadTimer.current);
    setCounts(defaultCounts);
    setConfirmedCounts(null);
    setPhase('configure');
  }
  const resultPeople = useMemo(() => {
    if (!confirmedCounts) return [];
    return ROLES.flatMap(r => PEOPLE_POOL.filter(p => p.type === r.key).slice(0, confirmedCounts[r.key]));
  }, [confirmedCounts]);
  const resultTabs = useMemo(() => {
    if (!confirmedCounts) return [];
    const total = Object.values(confirmedCounts).reduce((a,b) => a+b, 0);
    const tabs = [{ key:'all', label:`All (${total})` }];
    const tabLabel = { 'hiring-manager':'Hiring Manager', recruiter:'Recruiters', employee:'Employees' };
    ROLES.forEach(r => { if (confirmedCounts[r.key] > 0) tabs.push({ key:r.key, label:`${tabLabel[r.key]} (${confirmedCounts[r.key]})` }); });
    return tabs;
  }, [confirmedCounts]);
  const shownPeople = activeTab === 'all' ? resultPeople : resultPeople.filter(p => p.type === activeTab);
  const confirmedTotal   = confirmedCounts ? Object.values(confirmedCounts).reduce((a,b) => a+b, 0) : 0;
  const confirmedCredits = confirmedCounts ? ROLES.reduce((s,r) => s + r.credits * confirmedCounts[r.key], 0) : 0;

  // ── Phase: Configure ─────────────────────────────────────────────────────────
  if (phase === 'configure') {
    let ctaLabel = 'Find People';
    if (freeHasHM)      ctaLabel = 'Upgrade to Find Hiring Managers';
    else if (notEnough) ctaLabel = 'Not enough credits';

    return (
      <div style={{display:'flex', flexDirection:'column', gap:16, fontFamily:"'Inter',sans-serif"}}>
        <div>
          <h3 style={{fontSize:11, fontWeight:700, color:'#374151', margin:'0 0 8px', textTransform:'uppercase', letterSpacing:'0.08em'}}>FIND PEOPLE</h3>
          <p style={{fontSize:13, color:'#6B7280', margin:0}}>Who do you want to reach?</p>
        </div>
        <div style={{display:'flex', flexDirection:'column', gap:2}}>
          <div style={{display:'flex', alignItems:'center', gap:6}}>
            <AutoAwesomeIcon />
            <span style={{fontSize:13, fontWeight:500, color:'#4C62A8'}}>Suggested Mix</span>
          </div>
          <span style={{fontSize:12, color:'#9CA3AF'}}>Based on response rates for Senior Design roles</span>
        </div>
        <div style={{display:'flex', flexDirection:'column', gap:14}}>
          {ROLES.map(role => {
            const locked = role.premium && !isPremium;
            const count  = counts[role.key];
            const canInc = !locked && count < 5 && !atMax;
            const canDec = !locked && count > 0;
            const RoleIcon = role.key === 'hiring-manager' ? RocketIcon : role.key === 'recruiter' ? SearchIconBlue : PersonIcon;
            return (
              <div key={role.key} style={{display:'flex', alignItems:'center', justifyContent:'space-between', gap:12}}>
                <div style={{flex:1, minWidth:0}}>
                  <div style={{display:'flex', alignItems:'center', gap:8, flexWrap:'wrap'}}>
                    <RoleIcon />
                    <span style={{fontSize:14, fontWeight:500, color:'#111827'}}>{role.label}</span>
                    {role.premium && (
                      <span style={{background:'#DBEAFE', color:'#1D4ED8', borderRadius:9999, padding:'2px 8px', fontSize:10, fontWeight:600}}>Premium</span>
                    )}
                    {!role.premium && <InfoIconGray />}
                  </div>
                  <div style={{fontSize:12, color:'#9CA3AF', marginTop:2, paddingLeft:26}}>{role.credits} credits each</div>
                </div>
                <div style={{display:'flex', alignItems:'center', gap:4, opacity: locked ? 0.4 : 1}}>
                  <button onClick={() => canDec && adjustCount(role.key, -1)} disabled={!canDec || locked}
                    style={{width:28, height:28, display:'flex', alignItems:'center', justifyContent:'center', border:'1px solid #E5E7EB', borderRadius:6, background:'#fff', cursor: canDec&&!locked ? 'pointer' : 'not-allowed', color:'#374151', fontSize:16, fontFamily:'monospace', padding:0}}>
                    {locked ? <LockIcon /> : '−'}
                  </button>
                  <span style={{width:28, textAlign:'center', fontSize:14, fontWeight:600, color:'#111827'}}>{count}</span>
                  <button onClick={() => canInc && adjustCount(role.key, 1)} disabled={!canInc || locked}
                    style={{width:28, height:28, display:'flex', alignItems:'center', justifyContent:'center', border:'1px solid #E5E7EB', borderRadius:6, background:'#fff', cursor: canInc&&!locked ? 'pointer' : 'not-allowed', color:'#374151', fontSize:16, fontFamily:'monospace', padding:0}}>
                    {locked ? <LockIcon /> : '+'}
                  </button>
                </div>
              </div>
            );
          })}
        </div>
        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', paddingTop:10, borderTop:'1px solid #F1F5F9'}}>
          <span style={{fontSize:13, color:'#374151', fontWeight:500}}>{totalPeople} {totalPeople===1?'person':'people'} · {totalCredits} credits</span>
          {atMax && <span style={{fontSize:12, color:'#D97706', fontWeight:500}}>Max 10 people</span>}
        </div>
        {freeHasHM && <p style={{fontSize:12, color:'#6B7280', margin:0}}>Hiring managers require a Premium plan. <button onClick={onUpgradeClick} style={{background:'none',border:'none',color:'#4C62A8',cursor:'pointer',fontSize:12,fontWeight:500,padding:0,fontFamily:"'Inter',sans-serif"}}>Upgrade →</button></p>}
        {notEnough && <p style={{fontSize:12, color:'#6B7280', margin:0}}>Not enough credits. <button style={{background:'none',border:'none',color:'#4C62A8',cursor:'pointer',fontSize:12,fontWeight:500,padding:0,fontFamily:"'Inter',sans-serif"}}>Buy more →</button></p>}
        <button onClick={!ctaDisabled||freeHasHM ? handleFind : undefined} disabled={ctaDisabled&&!freeHasHM}
          style={{display:'flex', alignItems:'center', justifyContent:'center', gap:8, padding:'12px 0', background: ctaDisabled&&!freeHasHM ? 'rgba(17,24,39,0.4)' : '#111827', border:'none', borderRadius:8, fontSize:15, fontWeight:600, color:'#fff', cursor: ctaDisabled&&!freeHasHM ? 'not-allowed' : 'pointer', fontFamily:"'Inter',sans-serif", width:'100%'}}>
          <SearchIconWhite />{ctaLabel}
        </button>
      </div>
    );
  }

  // ── Phase: Loading ────────────────────────────────────────────────────────────
  if (phase === 'loading') {
    const summary = ROLES.filter(r => confirmedCounts[r.key] > 0)
      .map(r => { const n = confirmedCounts[r.key]; const noun = r.key==='hiring-manager'?`hiring manager${n>1?'s':''}`:r.key==='recruiter'?`recruiter${n>1?'s':''}`: `employee${n>1?'s':''}`; return `${n} ${noun}`; }).join(', ');
    return (
      <div className="flex flex-col gap-4">
        <h3 style={{fontSize:11, fontWeight:700, color:'#374151', margin:0, textTransform:'uppercase', letterSpacing:'0.08em'}}>FIND PEOPLE</h3>
        <p className="text-sm text-gray-400 animate-pulse">Finding {summary}…</p>
        <div className="flex flex-col gap-3">
          {[0,1,2].map(i => (
            <div key={i} className="border border-gray-100 rounded-xl p-4 animate-pulse">
              <div className="flex items-center gap-2 mb-3"><div className="h-3 w-24 bg-gray-100 rounded-full"/><div className="h-3 w-16 bg-gray-100 rounded-full"/></div>
              <div className="flex flex-col gap-2"><div className="h-2.5 w-full bg-gray-100 rounded-full"/><div className="h-2.5 w-3/4 bg-gray-100 rounded-full"/><div className="h-2.5 w-1/2 bg-gray-100 rounded-full"/></div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  // ── Phase: Results ────────────────────────────────────────────────────────────
  return (
    <div className="flex flex-col gap-4">
      <h3 style={{fontSize:11, fontWeight:700, color:'#374151', margin:0, textTransform:'uppercase', letterSpacing:'0.08em'}}>FIND PEOPLE</h3>
      <p className="text-xs text-gray-400">{confirmedCredits} credits used · {confirmedTotal} people found</p>
      <div className="flex items-end border-b border-gray-100 -mx-1 px-1 overflow-x-auto">
        {resultTabs.map(tab => (
          <button key={tab.key} onClick={() => setActiveTab(tab.key)}
            className={['flex items-center px-2.5 py-2.5 text-xs font-medium whitespace-nowrap border-b-2 -mb-px transition-colors', activeTab===tab.key ? 'text-gray-900 border-gray-900' : 'text-gray-400 border-transparent hover:text-gray-600'].join(' ')}>
            {tab.label}
          </button>
        ))}
      </div>
      <div className="flex flex-col gap-3">
        {shownPeople.map(p => <PersonCard key={p.id} person={p} />)}
      </div>
      <div className="pt-1 text-center">
        <button onClick={handleSearchAgain} className="text-xs text-blue-600 hover:underline">Search again</button>
      </div>
    </div>
  );
}

// ─── Filter Bar (2 states) ─────────────────────────────────────────────────────
const ALL_FILTER_OPTIONS = ['Remote', 'Full-time', '$100k+', 'Quick Apply'];
function FilterBar({ onSaveSearch, onMoreFilters }) {
  const [activeFilters, setActiveFilters] = useState(['Remote','Full-time','$100k+','Quick Apply']);
  const [showDropdown, setShowDropdown]   = useState(false);
  const dropdownRef = useRef(null);

  useEffect(() => {
    function handleClick(e) {
      if (dropdownRef.current && !dropdownRef.current.contains(e.target)) setShowDropdown(false);
    }
    document.addEventListener('mousedown', handleClick);
    return () => document.removeEventListener('mousedown', handleClick);
  }, []);

  const removeFilter = f => setActiveFilters(prev => prev.filter(x => x !== f));
  const addFilter    = f => { if (!activeFilters.includes(f)) setActiveFilters(prev => [...prev, f]); };
  const clearAll     = () => setActiveFilters([]);
  const hasFilters   = activeFilters.length > 0;
  const available    = ALL_FILTER_OPTIONS.filter(f => !activeFilters.includes(f));

  return (
    <div style={{background:'#f5f6f8', borderBottom:'1px solid #E5E7EB', padding:'16px 24px', display:'flex', flexDirection:'column', gap:12, flexShrink:0, fontFamily:"'Inter',sans-serif"}}>

          <AutoAwesomeIcon />
          Ask Scout

        <div style={{position:'relative', flex:1, maxWidth:480}}>
          <div style={{position:'absolute', left:12, top:'50%', transform:'translateY(-50%)', pointerEvents:'none', display:'flex', alignItems:'center'}}>
            <SearchIconBlue />
          </div>
          <input type="text" placeholder="Search by Name, Company or Title..."

        <button onClick={onMoreFilters} style={{display:'flex', alignItems:'center', gap:6, height:38, padding:'0 14px', background:'#fff', border:'1px solid #E5E7EB', borderRadius:8, fontSize:13, color:'#374151', cursor:'pointer', fontFamily:"'Inter',sans-serif", whiteSpace:'nowrap'}}>
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M2 4h11M2 7.5h11M2 11h11" stroke="#374151" strokeWidth="1.3" strokeLinecap="round"/><circle cx="5" cy="4" r="1.5" fill="white" stroke="#374151" strokeWidth="1.2"/><circle cx="10" cy="7.5" r="1.5" fill="white" stroke="#374151" strokeWidth="1.2"/><circle cx="6" cy="11" r="1.5" fill="white" stroke="#374151" strokeWidth="1.2"/></svg>

        ) : (

            <button onClick={() => setShowDropdown(v => !v)}
              style={{display:'inline-flex', alignItems:'center', gap:6, height:30, padding:'7px 13px', background:'rgba(123,143,201,0.1)', border:'1px solid rgba(123,143,201,0.3)', borderRadius:10, fontSize:13, color:'#4c62a8', fontWeight:500, cursor:'pointer', fontFamily:"'Inter',sans-serif"}}>
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="#4C62A8" strokeWidth="1.6" strokeLinecap="round"/></svg>

            </button>
            {showDropdown && (
              <div style={{position:'absolute', top:'calc(100% + 6px)', left:0, background:'#fff', border:'1px solid #E5E7EB', borderRadius:10, boxShadow:'0 4px 16px rgba(0,0,0,0.12)', zIndex:200, minWidth:160, padding:'6px 0', fontFamily:"'Inter',sans-serif"}}>
                {ALL_FILTER_OPTIONS.map(f => (

                    onMouseEnter={e => e.currentTarget.style.background='#F9FAFB'}
                    onMouseLeave={e => e.currentTarget.style.background='none'}>
                    {f}
                  </button>
                ))}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Save Search Modal ─────────────────────────────────────────────────────────

    <button onClick={onClick} style={{padding:'6px 14px', borderRadius:20, border:active?'1.5px solid #4C62A8':'1px solid #E5E7EB', background:active?'rgba(76,98,168,0.08)':'#fff', color:active?'#4C62A8':'#374151', fontSize:13, cursor:'pointer', fontFamily:"'Inter',sans-serif", fontWeight:active?500:400}}>{label}</button>

// ─── Toast ─────────────────────────────────────────────────────────────────────
function Toast({ toast, onDismiss }) {
  const isSaved = toast.type === 'saved';
  return (

      style={{position:'fixed', bottom:24, right:24, zIndex:9999, display:'flex', alignItems:'center', gap:12, background:'#fff', border:'1px solid #E5E7EB', borderRadius:12, padding:'14px 16px', boxShadow:'0 8px 32px rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.06)', minWidth:260, maxWidth:340, fontFamily:"'Inter',sans-serif", cursor:isSaved?'pointer':'default', userSelect:'none'}}>
      <div style={{flexShrink:0, width:32, height:32, background:'#EFF6FF', borderRadius:8, display:'flex', alignItems:'center', justifyContent:'center'}}>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3.5 2.5h9a1 1 0 011 1v10.5l-5.5-3-5.5 3V3.5a1 1 0 011-1z" fill="#3b82f6" stroke="#3b82f6" strokeWidth="1.4" strokeLinejoin="round"/></svg>
      </div>
      <div style={{flex:1, display:'flex', flexDirection:'column', gap:2}}>
        <span style={{fontSize:14, fontWeight:600, color:'#111827', lineHeight:'20px'}}>{isSaved ? 'Job saved!' : 'Job removed from saved'}</span>
        {isSaved && <span style={{fontSize:12, color:'#3b82f6', lineHeight:'16px'}}>View your saved jobs →</span>}
      </div>
      <button onClick={e=>{e.stopPropagation();onDismiss();}} style={{background:'none', border:'none', cursor:'pointer', padding:'4px', flexShrink:0, color:'#94a3b8', display:'flex', alignItems:'center', borderRadius:4}}>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 3l8 8M11 3l-8 8" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>
      </button>
    </div>
  );
}

// ─── Job Board ─────────────────────────────────────────────────────────────────
function JobBoard() {
  const [selectedId, setSelectedId]         = useState('stripe-spd');
  const [savedJobs, setSavedJobs]           = useState(new Set());
  const [dismissedJobs, setDismissedJobs]   = useState(new Set());
  const [toast, setToast]                   = useState(null);
  const autoRef = useRef(null);
  const exitRef = useRef(null);

  const selectedJob = JOBS.find(j => j.id === selectedId);
  const recentJobs  = JOBS.filter(j => j.section === 'recent');
  const recJobs     = JOBS.filter(j => j.section === 'recommended');

  function startExit() {
    setToast(t => t ? { ...t, exiting: true } : null);
    exitRef.current = setTimeout(() => setToast(null), 220);
  }
  function handleToggleSave(jobId) {
    const willBeSaved = !savedJobs.has(jobId);
    setSavedJobs(prev => { const n = new Set(prev); willBeSaved ? n.add(jobId) : n.delete(jobId); return n; });
    clearTimeout(autoRef.current);
    clearTimeout(exitRef.current);
    setToast({ type: willBeSaved ? 'saved' : 'removed', uid: Date.now(), exiting: false });
    autoRef.current = setTimeout(startExit, 4000);
  }
  function dismissToast() { clearTimeout(autoRef.current); startExit(); }
  function handleDismissJob(jobId) {
    setDismissedJobs(prev => { const n = new Set(prev); n.add(jobId); return n; });
    if (selectedId === jobId) {
      const visible = JOBS.filter(j => j.id !== jobId && !dismissedJobs.has(j.id));
      if (visible.length) setSelectedId(visible[0].id);
    }
  }
  function handleUndoJob(jobId) {
    setDismissedJobs(prev => { const n = new Set(prev); n.delete(jobId); return n; });
  }

  return (
    <>
      {/* Left column */}
      <div style={{flex:'0 0 479px', overflowY:'auto', display:'flex', flexDirection:'column', background:'white', borderRadius:24, borderTop:'1px solid #e5e5e5', borderRight:'1px solid #e5e5e5', padding:'0 16px'}}>
        <div style={{padding:'24px 20px 0'}}>
          <h2 style={{fontSize:24, fontWeight:500, color:'#0f172a', margin:0, fontFamily:"'Lora', serif"}}>Recent job postings</h2>
        </div>
        {recentJobs.map(job => (
          <JobCard key={job.id} job={job}
            selected={selectedId === job.id}
            onClick={() => !dismissedJobs.has(job.id) && setSelectedId(job.id)}
            saved={savedJobs.has(job.id)} onToggleSave={handleToggleSave}
            dismissed={dismissedJobs.has(job.id)}
            onDismiss={() => handleDismissJob(job.id)}
            onUndo={() => handleUndoJob(job.id)} />
        ))}
        <div style={{padding:'24px 20px 0'}}>
          <h2 style={{fontSize:24, fontWeight:500, color:'#0f172a', margin:0, fontFamily:"'Lora', serif"}}>Recommended for you</h2>
        </div>
        {recJobs.map(job => (
          <JobCard key={job.id} job={job}
            selected={selectedId === job.id}
            onClick={() => !dismissedJobs.has(job.id) && setSelectedId(job.id)}
            saved={savedJobs.has(job.id)} onToggleSave={handleToggleSave}
            dismissed={dismissedJobs.has(job.id)}
            onDismiss={() => handleDismissJob(job.id)}
            onUndo={() => handleUndoJob(job.id)} />
        ))}
      </div>
      {/* Right panel */}
      {selectedJob && (
        <div style={{flex:1, minWidth:0, display:'flex', flexDirection:'column', overflowY:'auto', background:'white', borderRadius:24}}>
          <JobDetail job={selectedJob} isSaved={savedJobs.has(selectedJob.id)} onSave={() => handleToggleSave(selectedJob.id)} />
        </div>
      )}
      {/* Toast */}
      {toast && <Toast key={toast.uid} toast={toast} onDismiss={dismissToast} />}
    </>
  );
}

// ─── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [showSaveSearch, setShowSaveSearch]   = useState(false);
  const [showMoreFilters, setShowMoreFilters] = useState(false);
  return (

      {showSaveSearch  && <SaveSearchModal onClose={() => setShowSaveSearch(false)} />}
      {showMoreFilters && <MoreFiltersPanel onClose={() => setShowMoreFilters(false)} onApply={() => {}} />}
    </div>
  );
}
