<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Google Sans Flex', 'Google Sans', system-ui, -apple-system, sans-serif;
    background: #FFFFFF;
    color: #111418;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  :root {
    --bg: #f7f6f3;
    --card: #ffffff;
    --ink: #111418;
    --ink-soft: #4b5563;
    --muted: #8a8f98;
    --line: #e7e5df;
    --line-soft: #efede7;
    --side-bg: #0d1623;
    --side-ink: #e8eaee;
    --side-muted: #8b94a4;
    --side-hover: rgba(255,255,255,0.04);
    --side-active: #1a2740;
    --accent: #6b7a8f;
    --accent-ink: #ffffff;
    --good: oklch(0.62 0.10 155);
    --warn: oklch(0.74 0.14 75);
    --serif: 'Cormorant Garamond', 'Iowan Old Style', Georgia, serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  button { font-family: inherit; cursor: pointer; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #d6d4cd; border-radius: 10px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: #b9b7af; }
  textarea::placeholder, input::placeholder { color: #b3b6bf !important; opacity: 1; }
  textarea::-webkit-input-placeholder, input::-webkit-input-placeholder { color: #b3b6bf !important; }
</style>
