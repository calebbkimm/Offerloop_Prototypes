<!DOCTYPE html>

<style>
  *, *::before, *::after { box-sizing: border-box; }

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script type="text/babel">

// ===== TWEAKS PANEL =====
const __TWEAKS_STYLE = `
  .twk-panel{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:280px;max-height:calc(100vh - 32px);display:flex;flex-direction:column;transform:scale(var(--dc-inv-zoom,1));transform-origin:bottom right;background:rgba(250,249,247,.78);color:#29261b;-webkit-backdrop-filter:blur(24px) saturate(160%);backdrop-filter:blur(24px) saturate(160%);border:.5px solid rgba(255,255,255,.6);border-radius:14px;box-shadow:0 1px 0 rgba(255,255,255,.5) inset,0 12px 40px rgba(0,0,0,.18);font:11.5px/1.4 ui-sans-serif,system-ui,-apple-system,sans-serif;overflow:hidden}
  .twk-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 8px 10px 14px;cursor:move;user-select:none}
  .twk-hd b{font-size:12px;font-weight:600}
  .twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);width:22px;height:22px;border-radius:6px;cursor:default;font-size:13px;line-height:1}
  .twk-x:hover{background:rgba(0,0,0,.06);color:#29261b}
  .twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;overflow-x:hidden;min-height:0}
  .twk-row{display:flex;flex-direction:column;gap:5px}
  .twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px}
  .twk-lbl{display:flex;justify-content:space-between;align-items:baseline;color:rgba(41,38,27,.72)}
  .twk-lbl>span:first-child{font-weight:500}
  .twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:rgba(41,38,27,.45);padding:10px 0 0}
  .twk-field{appearance:none;box-sizing:border-box;width:100%;min-width:0;height:26px;padding:0 8px;border:.5px solid rgba(0,0,0,.1);border-radius:7px;background:rgba(255,255,255,.6);color:inherit;font:inherit;outline:none}
  .twk-slider{appearance:none;-webkit-appearance:none;width:100%;height:4px;margin:6px 0;border-radius:999px;background:rgba(0,0,0,.12);outline:none}
  .twk-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;background:#fff;border:.5px solid rgba(0,0,0,.12);box-shadow:0 1px 3px rgba(0,0,0,.2);cursor:default}
  .twk-seg{position:relative;display:flex;padding:2px;border-radius:8px;background:rgba(0,0,0,.06);user-select:none}
  .twk-seg-thumb{position:absolute;top:2px;bottom:2px;border-radius:6px;background:rgba(255,255,255,.9);box-shadow:0 1px 2px rgba(0,0,0,.12);transition:left .15s,width .15s}
  .twk-seg button{appearance:none;position:relative;z-index:1;flex:1;border:0;background:transparent;color:inherit;font:inherit;font-weight:500;min-height:22px;border-radius:6px;cursor:default;padding:4px 6px;line-height:1.2}
  .twk-toggle{position:relative;width:32px;height:18px;border:0;border-radius:999px;background:rgba(0,0,0,.15);transition:background .15s;cursor:default;padding:0}
  .twk-toggle[data-on="1"]{background:#34c759}
  .twk-toggle i{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);transition:transform .15s}
  .twk-toggle[data-on="1"] i{transform:translateX(14px)}
  .twk-chips{display:flex;gap:6px}
  .twk-chip{position:relative;appearance:none;flex:1;min-width:0;height:46px;padding:0;border:0;border-radius:6px;overflow:hidden;cursor:default;box-shadow:0 0 0 .5px rgba(0,0,0,.12),0 1px 2px rgba(0,0,0,.06);transition:transform .12s,box-shadow .12s}
  .twk-chip[data-on="1"]{box-shadow:0 0 0 1.5px rgba(0,0,0,.85),0 2px 6px rgba(0,0,0,.15)}
  .twk-chip>span{position:absolute;top:0;bottom:0;right:0;width:34%;display:flex;flex-direction:column;box-shadow:-1px 0 0 rgba(0,0,0,.1)}
  .twk-chip>span>i{flex:1;box-shadow:0 -1px 0 rgba(0,0,0,.1)}
  .twk-chip svg{position:absolute;top:6px;left:6px;width:13px;height:13px;filter:drop-shadow(0 1px 1px rgba(0,0,0,.3))}
  .twk-swatch{appearance:none;-webkit-appearance:none;width:56px;height:22px;border:.5px solid rgba(0,0,0,.1);border-radius:6px;padding:0;cursor:default;background:transparent;flex-shrink:0}
  .twk-swatch::-webkit-color-swatch-wrapper{padding:0}
  .twk-swatch::-webkit-color-swatch{border:0;border-radius:5.5px}
`;

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;
  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current; if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    offsetRef.current = { x: Math.min(Math.max(PAD, window.innerWidth - w - PAD), Math.max(PAD, offsetRef.current.x)), y: Math.min(Math.max(PAD, window.innerHeight - h - PAD), Math.max(PAD, offsetRef.current.y)) };
    panel.style.right = offsetRef.current.x + 'px'; panel.style.bottom = offsetRef.current.y + 'px';
  }, []);
  React.useEffect(() => {
    const onMsg = (e) => { if (e?.data?.type === '__activate_edit_mode') setOpen(true); else if (e?.data?.type === '__deactivate_edit_mode') setOpen(false); };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);
  const onDragStart = (e) => {
    const panel = dragRef.current; if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY, startRight = window.innerWidth - r.right, startBottom = window.innerHeight - r.bottom;
    const move = (ev) => { offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) }; clampToViewport(); };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
  };
  if (!open) return null;
  return (
    <><style>{__TWEAKS_STYLE}</style>
    <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
      <div className="twk-hd" onMouseDown={onDragStart}><b>{title}</b><button className="twk-x" onClick={() => setOpen(false)}>✕</button></div>
      <div className="twk-body">{children}</div>
    </div></>
  );
}
function TweakSection({ label, children }) { return (<><div className="twk-sect">{label}</div>{children}</>); }
function TweakRow({ label, value, children, inline = false }) {
  return (<div className={inline ? 'twk-row twk-row-h' : 'twk-row'}><div className="twk-lbl"><span>{label}</span>{value != null && <span>{value}</span>}</div>{children}</div>);
}
function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (<TweakRow label={label} value={`${value}${unit}`}><input type="range" className="twk-slider" min={min} max={max} step={step} value={value} onChange={(e) => onChange(Number(e.target.value))} /></TweakRow>);
}
function TweakToggle({ label, value, onChange }) {
  return (<div className="twk-row twk-row-h"><div className="twk-lbl"><span>{label}</span></div><button type="button" className="twk-toggle" data-on={value ? '1' : '0'} onClick={() => onChange(!value)}><i /></button></div>);
}
function TweakSelect({ label, value, options, onChange }) {
  return (<TweakRow label={label}><select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>{options.map((o) => { const v = typeof o === 'object' ? o.value : o; const l = typeof o === 'object' ? o.label : o; return <option key={v} value={v}>{l}</option>; })}</select></TweakRow>);
}
function TweakRadio({ label, value, options, onChange }) {
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  return (
    <TweakRow label={label}>
      <div role="radiogroup" className="twk-seg" onClick={(e) => { const i = Math.floor(((e.clientX - e.currentTarget.getBoundingClientRect().left - 2) / (e.currentTarget.offsetWidth - 4)) * n); if (opts[Math.max(0, Math.min(n-1, i))]) onChange(opts[Math.max(0, Math.min(n-1, i))].value); }}>
        <div className="twk-seg-thumb" style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (<button key={o.value} type="button" role="radio" aria-checked={o.value === value}>{o.label}</button>))}
      </div>
    </TweakRow>
  );
}
function __twkIsLight(hex) {
  const h = String(hex).replace('#', ''); const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16); if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (<div className="twk-row twk-row-h"><div className="twk-lbl"><span>{label}</span></div><input type="color" className="twk-swatch" value={value} onChange={(e) => onChange(e.target.value)} /></div>);
  }
  const key = (o) => String(JSON.stringify(o)).toLowerCase(); const cur = key(value);
  return (<TweakRow label={label}><div className="twk-chips" role="radiogroup">{options.map((o, i) => { const colors = Array.isArray(o) ? o : [o]; const [hero, ...rest] = colors; const on = key(o) === cur; return (<button key={i} type="button" className="twk-chip" data-on={on ? '1' : '0'} style={{ background: hero }} onClick={() => onChange(o)}>{rest.length > 0 && (<span>{rest.slice(0,4).map((c, j) => <i key={j} style={{ background: c }} />)}</span>)}{on && <svg viewBox="0 0 14 14" aria-hidden="true"><path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" stroke={__twkIsLight(hero) ? 'rgba(0,0,0,.78)' : '#fff'} /></svg>}</button>); })}</div></TweakRow>);
}


// ===== ICONS =====
const Icon = ({ d, size = 18, stroke = 1.6, fill = "none", style: s, ...p }) =>
  <svg width={size} height={size} viewBox="0 0 20 20" fill={fill} stroke="currentColor" strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round" style={{ stroke: "rgb(0,0,0)", ...s }} {...p}>{typeof d === 'string' ? <path d={d} /> : d}</svg>;

const IconSearch = ({ size = 16, ...p }) => <svg width={size} height={size} viewBox="0 0 16 16" fill="none" {...p}><path d="M10.33 9.33H9.81L9.62 9.15A6.67 6.67 0 1 0 8.67 10L9.8 11.13 12.67 14 13.66 13l-3.33-3.33ZM6.33 9.33A3.33 3.33 0 1 1 9.67 6a3.33 3.33 0 0 1-3.34 3.33Z" fill="#F3F3F6"/></svg>;
const IconCoffee = ({ size = 16, ...p }) => <svg width={size} height={size} viewBox="0 0 16 16" fill="none" {...p}><path d="M12.33 2H4a1.33 1.33 0 0 0-1.33 1.33V7.14C2.67 9.69 4.63 11.93 7.19 12c2.64.08 4.81-2.04 4.81-4.67V6.67h.33A2.33 2.33 0 0 0 12.33 2ZM3.33 12.67h9.34c.36 0 .66.3.66.66 0 .37-.3.67-.66.67H3.33a.67.67 0 0 1 0-1.33Z" fill="#F3F3F6"/></svg>;
const IconTracker = ({ size = 16, ...p }) => <svg width={size} height={size} viewBox="0 0 16 16" fill="none" {...p}><path d="M8 1.33A6.67 6.67 0 1 0 14.67 8 6.67 6.67 0 0 0 8 1.33ZM8 12A4 4 0 1 1 12 8 4 4 0 0 1 8 12Z" fill="#F3F3F6"/><circle cx="8" cy="8" r="1.33" fill="#F3F3F6"/></svg>;
const IconBoard = ({ size = 16, ...p }) => <svg width={size} height={size} viewBox="0 0 16 16" fill="none" {...p}><path d="M2 2h5.33v5.33H2ZM8.67 2H14v5.33H8.67ZM2 8.67h5.33V14H2ZM8.67 8.67H14V14H8.67Z" fill="#F3F3F6"/></svg>;

const IconSidebar = (p) => <Icon {...p} d={<><rect x="3" y="4" width="14" height="13" rx="2"/><path d="M8 4v13"/></>}/>;
const IconMail = (p) => <Icon {...p} d={<><rect x="2.5" y="4.5" width="15" height="11" rx="1.5" style={{stroke:"rgb(10,10,10)"}}/><path d="M3 6l7 5 7-5" style={{stroke:"rgb(0,0,0)"}}/></>}/>;
const IconUpload = (p) => <Icon {...p} d={<><path d="M10 13V3 M6 7l4-4 4 4"/><path d="M3 14v2a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2"/></>}/>;
const IconLinkedin = ({ size = 16, ...p }) => <svg width={size} height={size} viewBox="0 0 16 16" fill="none" {...p}><path d="M10.67 5.33a4 4 0 0 1 4 4V14H12V9.33a1.33 1.33 0 0 0-2.67 0V14H6.67V9.33a4 4 0 0 1 4-4Z" stroke="#0A0A0A" strokeLinecap="round" strokeLinejoin="round"/><path d="M4 6H1.33V14H4V6Z" stroke="#0A0A0A" strokeLinecap="round" strokeLinejoin="round"/><circle cx="2.67" cy="2.67" r="1.33" stroke="#0A0A0A" strokeLinecap="round" strokeLinejoin="round"/></svg>;
const IconSparkle = (p) => <Icon {...p} d={<><path d="M10 2v4 M10 14v4 M2 10h4 M14 10h4" style={{stroke:"rgb(225,122,62)"}}/><path d="M5 5l2 2 M13 13l2 2 M5 15l2-2 M13 7l2-2" style={{stroke:"rgb(225,122,62)"}}/></>}/>;
const IconFilter = (p) => <Icon {...p} d={<><path d="M3 5h14 M5 10h10 M8 15h4"/></>}/>;
const IconRefresh = () => <svg width="13" height="13" viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><path d="M4 10a6 6 0 0 1 10-4.3M16 10a6 6 0 0 1-10 4.3"/><path d="M14 3v3h-3 M6 17v-3h3"/></svg>;
const IconDownload = () => <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><path d="M10 3v10 M6 9l4 4 4-4"/><path d="M3 17h14"/></svg>;
const IconTrash = () => <svg width="13" height="13" viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><path d="M4 6h12 M8 6V4h4v2 M6 6l1 11h6l1-11"/></svg>;
const IconBookmark = () => <svg width="13" height="13" viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"><path d="M6 3h8v14l-4-3-4 3z"/></svg>;

function IconEdit() { return <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M13.5 13.76V14.09H2.5v-.33h11ZM9.98 1.83a.19.19 0 0 1 .23 0l1.89 1.89a.16.16 0 0 1 0 .23L4.62 11.43H2.5V9.3l7.48-7.48Zm-7.14 7.61v1.64H4.48l6.91-6.91.35-.36-.35-.35-.94-.94-.35-.36-7.26 7.27Z" stroke="white"/></svg>; }
function IconArrowUp() { return <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 16V5"/><path d="M5 10l5-5 5 5"/></svg>; }


// ===== SIDEBAR =====
const sidebarStyles = {
  shell: { width: 232, minWidth: 232, height: '100vh', background: '#0b1733', color: '#dbe1ee', display: 'flex', flexDirection: 'column', padding: '14px 12px', fontSize: 13.5 },
  navItem: (active, id) => ({ display: 'flex', alignItems: 'center', gap: 10, padding: '8.5px 10px', borderRadius: 8, color: '#ffffff', background: active && id === 'find' ? '#1E2D4D' : 'transparent', cursor: 'pointer', fontWeight: active ? 500 : 400, transition: 'background 120ms', userSelect: 'none' }),
};

function Sidebar({ active, onNav, credits = 210, max = 300 }) {
  const items = [{ id: 'find', label: 'Find', I: IconSearch }, { id: 'coffee', label: 'Coffee Chat Prep', I: IconCoffee }, { id: 'tracker', label: 'Tracker', I: IconTracker }, { id: 'board', label: 'Job Board', I: IconBoard }];
  const bottom = [{ id: 'pricing', label: 'Pricing', I: IconTag }, { id: 'docs', label: 'Documentation', I: IconDoc }];
  const pct = Math.round(credits / max * 100);
  return (
    <aside style={sidebarStyles.shell}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 9, padding: '6px', borderRadius: 8, cursor: 'pointer' }}>
          <div style={{ width: 26, height: 26, borderRadius: '50%', background: 'radial-gradient(circle at 35% 30%, #6f8bff 0%, #2538b5 55%, #0c1238 100%)', flexShrink: 0 }}></div>
          <div style={{ fontWeight: 500, fontSize: 13 }}>John Doe</div>
          <IconChev size={13} style={{ opacity: 0.6 }} />
        </div>
        <button style={{ background: 'transparent', border: 'none', color: '#8b94a4', padding: 6, borderRadius: 6, display: 'flex', cursor: 'pointer' }}><IconSidebar size={16} /></button>
      </div>
      <nav style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
        {items.map(({ id, label, I }) =>
          <div key={id} style={sidebarStyles.navItem(active === id, id)} onClick={() => onNav(id)}
            onMouseEnter={(e) => { if (active !== id) e.currentTarget.style.background = 'rgba(255,255,255,0.04)'; }}
            onMouseLeave={(e) => { if (active !== id) e.currentTarget.style.background = 'transparent'; }}>
            <I size={15} />
            <span style={{ color: 'rgb(147,197,253)' }}>{label}</span>
          </div>
        )}
      </nav>
      <div style={{ flex: 1 }}></div>
      <nav style={{ display: 'flex', flexDirection: 'column', gap: 2, marginBottom: 8 }}>
        {bottom.map(({ id, label, I }) =>
          <div key={id} style={sidebarStyles.navItem(active === id, id)} onClick={() => onNav(id)}
            onMouseEnter={(e) => { if (active !== id) e.currentTarget.style.background = 'rgba(255,255,255,0.04)'; }}
            onMouseLeave={(e) => { if (active !== id) e.currentTarget.style.background = 'transparent'; }}>
            <I size={15} /><span>{label}</span>
          </div>
        )}

const resBtn = (variant = 'default') => ({ background: variant === 'primary' ? '#4A60A8' : '#fff', color: variant === 'primary' ? '#fff' : '#3a4150', border: variant === 'primary' ? 'none' : '1px solid #e7e5df', borderRadius: 9, padding: '8px 14px', fontSize: 13, fontWeight: 500, display: 'inline-flex', alignItems: 'center', gap: 6, cursor: 'pointer', transition: 'background 120ms' });
const contactCardStyle = { background: '#fff', border: '1px solid #e7e5df', borderRadius: 12, padding: '16px 18px', marginBottom: 10, display: 'flex', alignItems: 'center', gap: 14 };
const actionIconBtn = { background: 'transparent', border: 'none', cursor: 'pointer', padding: 0, color: 'inherit', display: 'flex', alignItems: 'center' };

function Avatar({ name, seed }) {
  const initials = name.split(' ').map((s) => s[0]).slice(0, 2).join('').toUpperCase();
  return <div style={{ width: 34, height: 34, borderRadius: '50%', flexShrink: 0, background: `linear-gradient(135deg, hsl(${seed * 47 % 360} 35% 55%), hsl(${(seed * 47 + 60) % 360} 40% 35%))`, color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11.5, fontWeight: 600 }}>{initials}</div>;
}

function SkeletonCard({ delay }) {
  return <div style={{ ...contactCardStyle, animation: `pulse 1.6s ease-in-out infinite`, animationDelay: delay + 'ms' }}><div style={{ width: 34, height: 34, borderRadius: '50%', background: '#ece9e1' }}></div><div style={{ flex: 1 }}><div style={{ height: 12, background: '#ece9e1', borderRadius: 4, width: '30%', marginBottom: 8 }}></div><div style={{ height: 11, background: '#ece9e1', borderRadius: 4, width: '50%' }}></div></div></div>;
}

function Pagination({ page, perPage, total, onPage, onPerPage }) {
  const totalPages = Math.max(1, Math.ceil(total / perPage));
  return (
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'flex-end', gap: 18, marginTop: 18, fontSize: 13, color: '#3a4150' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
        <span>Rows per page</span>
        <select value={perPage} onChange={(e) => onPerPage(Number(e.target.value))} style={{ border: '1px solid #e7e5df', borderRadius: 7, padding: '4px 8px', fontSize: 13, background: '#fff', cursor: 'pointer' }}>
          {[6, 12, 24, 50].map((n) => <option key={n} value={n}>{n}</option>)}
        </select>
      </div>
      <div>Page {page} of {totalPages}</div>
      <div style={{ display: 'flex', gap: 4 }}>
        {[{ l: '«', a: 1 }, { l: '‹', a: Math.max(1, page - 1) }, { l: '›', a: Math.min(totalPages, page + 1) }, { l: '»', a: totalPages }].map((b, bi) => {
          const dis = (bi < 2 && page === 1) || (bi >= 2 && page === totalPages);
          return <button key={b.l} disabled={dis} onClick={() => onPage(b.a)} style={{ width: 28, height: 28, borderRadius: 6, border: '1px solid #e7e5df', background: '#fff', color: dis ? '#c6cbd6' : '#3a4150', cursor: dis ? 'not-allowed' : 'pointer', fontSize: 13 }}>{b.l}</button>;
        })}
      </div>
    </div>
  );
}

function CompaniesSpreadsheetView({ results, loading, onBack, count }) {
  const [page, setPage] = React.useState(1);
  const [perPage, setPerPage] = React.useState(12);
  const [search, setSearch] = React.useState('');
  const [selected, setSelected] = React.useState(new Set());

  const start = (page - 1) * perPage;

  const toggle = (i) => { const s = new Set(selected); s.has(i) ? s.delete(i) : s.add(i); setSelected(s); };

    const rows = [['Company', 'Website', 'LinkedIn', 'Industry', 'Location'], ...filtered.map((r) => [r.name, r.website, r.linkedin, r.industry, r.location])];
    const csv = rows.map((r) => r.map((c) => `"${(c || '').toString().replace(/"/g, '""')}"`).join(',')).join('\n');

    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'companies.csv'; a.click();
    URL.revokeObjectURL(url);
  };
  const gridCols = '36px 2fr 1fr 1fr 1.4fr 1.4fr 130px';
  return (
    <main style={{ flex: 1, height: '100vh', overflowY: 'auto', background: '#FFFFFF' }}>

            <input value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Search..." style={{ border: 'none', outline: 'none', background: 'transparent', flex: 1, fontSize: 13.5, fontFamily: 'inherit', color: '#3a4150' }} />
          </div>
          <button style={resBtn()} onClick={onBack} onMouseEnter={(e) => e.currentTarget.style.background='#f3f1ec'} onMouseLeave={(e) => e.currentTarget.style.background='#fff'}><IconRefresh /> Refresh</button>
          <button style={resBtn()} onClick={exportCSV} onMouseEnter={(e) => e.currentTarget.style.background='#f3f1ec'} onMouseLeave={(e) => e.currentTarget.style.background='#fff'}><IconDownload /> Export CSV</button>
          <button style={resBtn()} onClick={() => setSelected(new Set())} onMouseEnter={(e) => e.currentTarget.style.background='#fdf2f2'} onMouseLeave={(e) => e.currentTarget.style.background='#fff'}><IconTrash /> Delete All</button>
        </div>
        <div style={{ background: '#fff', border: '1px solid #e7e5df', borderRadius: 10, overflow: 'auto' }}>
          <div style={{ display: 'grid', gridTemplateColumns: gridCols, alignItems: 'center', gap: 8, padding: '12px 14px', minWidth: 920, fontSize: 14, fontWeight: 550, color: '#0A0A0A', borderBottom: '1px solid #e7e5df' }}>
            <div></div><div>Company</div><div>Website</div><div>LinkedIn</div><div>Industry</div><div>Location</div><div>Action</div>
          </div>
          {loading && [...Array(8)].map((_, i) => <div key={i} style={{ display: 'grid', gridTemplateColumns: gridCols, minWidth: 920, alignItems: 'center', gap: 8, padding: '13px 14px', borderBottom: '1px solid #f3f1ec' }}><div style={{ width: 36, display: 'flex', justifyContent: 'center' }}><input type="checkbox" disabled /></div><div style={{ height: 12, background: '#ece9e1', borderRadius: 4, width: '60%', animation: `pulse 1.6s ease-in-out infinite`, animationDelay: `${i * 80}ms` }}></div><div></div><div></div><div></div><div></div><div></div></div>)}
          {!loading && slice.map((r, i) =>
            <div key={start + i} style={{ display: 'grid', gridTemplateColumns: gridCols, minWidth: 920, alignItems: 'center', gap: 8, padding: '13px 14px', fontSize: 14, color: '#0A0A0A', borderBottom: '1px solid #f3f1ec', background: '#fff', transition: 'background 80ms' }}

              <div style={{ width: 36, display: 'flex', justifyContent: 'center' }}><input type="checkbox" checked={selected.has(start + i)} onChange={() => toggle(start + i)} /></div>
              <div style={{ fontWeight: 500 }}>{r.name}</div>
              <div><a href="#" onClick={(e) => e.preventDefault()} style={{ color: '#0A0A0A', textDecoration: 'none' }}>Website</a></div>

              <div style={{ display: 'flex', gap: 14, color: '#767676' }}><button style={actionIconBtn}><IconBookmark /></button><button style={actionIconBtn}><IconArchive /></button></div>
            </div>
          )}
        </div>
        {!loading && filtered.length > 0 && <Pagination page={page} perPage={perPage} total={filtered.length} onPage={setPage} onPerPage={(n) => { setPerPage(n); setPage(1); }} />}
      </div>
    </main>
  );
}

const TWEAK_DEFAULTS = { "accentColor": "#4A60A8", "headingFont": "Cormorant Garamond" };

async function findContacts({ query, tab, count, template }) {
  const subjectByTab = tab === 'companies' ? 'companies' : tab === 'managers' ? 'hiring managers / recruiters' : 'individual professionals';
  const tone = template?.saved || 'Networking';
  const sig = template?.signature || 'Alex Chen';
  const signOff = template?.signOff || 'Best,';

  const peopleSchema = `{"name":"<full name>","role":"<job title>","company":"<company name>","location":"<City, State or Remote>","email":"<plausible work email>","handle":"<linkedin slug>","match":<integer 70-99>,"draft":"<4-6 sentence cold outreach. Tone: ${tone}. Sign: ${signOff}\\n${sig}>"}`;
  const companySchema = `{"name":"<company name>","website":"<url>","linkedin":"<slug>","industry":"<industry>","location":"<HQ city>","stage":"<e.g. Series B>"}`;
  const managerSchema = `{"name":"<full name>","role":"Hiring Manager","company":"<company name>","location":"<City, State>","email":"<plausible work email>","handle":"<linkedin slug>","match":<integer 70-99>,"draft":"<4-6 sentence email. Tone: ${tone}. Sign: ${signOff}\\n${sig}>"}`;
  const schema = tab === 'companies' ? companySchema : tab === 'managers' ? managerSchema : peopleSchema;

  const prompt = `You are powering a contact-finder tool for a college student. QUERY: "${query}" TYPE: ${subjectByTab} COUNT: ${count}\nGenerate ${count} REALISTIC-SOUNDING but FICTIONAL results. Return ONLY a JSON array, no markdown, no preamble. Each item: ${schema}`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, messages: [{ role: "user", content: prompt }] })
  });
  const data = await response.json();
  const raw = data.content.map(i => i.text || '').join('');
  const cleaned = raw.replace(/```json|```/g, '').trim();
  const start = cleaned.indexOf('[');
  const end = cleaned.lastIndexOf(']');
  if (start === -1 || end === -1) throw new Error('No JSON array in response');
  return JSON.parse(cleaned.slice(start, end + 1));
}

function mockResults(query, count, tab) {
  const peopleNames = ['Priya Anand','Marcus Chen','Sarah Liu','David Okafor','Elena Vasquez','James Park','Aisha Rahman','Tom Wright','Maya Patel','Chris Nguyen','Sofia Romano','Jordan Kim'];
  const companies = ['Linear','Figma','Anthropic','Stripe','Notion','Ramp','Vercel','Vanta','Plaid','Modern Treasury','Mercury','Brex','Pulley','Replit','Retool','Census','Hex','Airbyte','Dagster','Prisma'];
  const roles = ['Senior Product Designer','Product Manager','Software Engineer','Engineering Manager','Founding Engineer','Design Lead'];
  const industries = ['Fintech','AI/ML','DevTools','Climate','Healthtech','Consumer','Enterprise SaaS','Marketplaces'];
  const cities = ['NYC','San Francisco','Remote','Brooklyn','Seattle','Austin','Boston'];

  if (tab === 'companies') {
    return [...Array(count)].map((_, i) => ({ name: companies[i % companies.length], website: companies[i % companies.length].toLowerCase() + '.com', linkedin: 'company/' + companies[i % companies.length].toLowerCase(), industry: industries[i % industries.length], location: cities[i % cities.length], stage: ['Seed','Series A','Series B','Series C'][i % 4] }));
  }
  return [...Array(count)].map((_, i) => {
    const name = peopleNames[i % peopleNames.length];
    const co = companies[i % companies.length];
    const role = tab === 'managers' ? 'Hiring Manager' : roles[i % roles.length];
    const first = name.split(' ')[0].toLowerCase();
    const last = name.split(' ')[1].toLowerCase();
    return { name, role, company: co, location: cities[i % cities.length], email: `${first}.${last}@${co.toLowerCase()}.com`, handle: `${first}${last}`, match: 95 - (i % 10) * 2, draft: `Hi ${first},\n\nI'm Alex, a junior at UC San Diego studying Cognitive Science. I came across your work at ${co} and was struck by your team's recent direction.\n\nWould you be open to a brief 15-minute chat?\n\nBest,\nAlex` };
  });
}

  };

  const handleViewChange = (key) => {
    setResultViewKey(key);
    if (key === 'tracker') { onAddToTracker(results); setActive('tracker'); }
  };

  const renderFindArea = () => {
    if (view === 'input') return <FindView tab={tab} setTab={setTab} params={params} setParams={setParams} onSearch={onSearch} loading={loading} onOpenTemplate={() => setView('template')} />;
    if (view === 'template') return <EmailTemplateView onBack={() => setView('input')} template={emailTemplate} setTemplate={setEmailTemplate} />;
    if (lastTab === 'people') return <PeopleContactsView query={lastQuery} count={params.count} results={results} loading={loading} onBack={() => setView('input')} onDraftEmail={() => setView('template')} viewKey={resultViewKey} setViewKey={handleViewChange} />;
    if (lastTab === 'companies') return <CompaniesSpreadsheetView count={params.count} results={results} loading={loading} onBack={() => setView('input')} />;
    return <ManagersListView count={params.count} results={results} loading={loading} onBack={() => setView('input')} viewKey={resultViewKey} setViewKey={handleViewChange} />;
  };

  return (
    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden' }}>
      <Sidebar active={active} onNav={(id) => {
        setActive(id);
        if (id === 'find') { setView('input'); setTab('people'); setParams({ query: '', count: 1 }); }
      }} />
      {active === 'find' && renderFindArea()}
      {active === 'coffee' && <CoffeeChatView />}
      {active === 'tracker' && <TrackerView contacts={trackerExtras} />}
      {active === 'board' && <JobBoardView />}
      {active === 'pricing' && <GenericView title="Pricing" sub="Plans and credit packages." />}
      {active === 'docs' && <GenericView title="Documentation" sub="Guides for getting the most out of Find." />}
      <TweaksPanel title="Tweaks">
        <TweakSection label="Brand">
          <TweakColor label="Primary accent" value={t.accentColor} onChange={(v) => setTweak('accentColor', v)} options={['#4A60A8','#1f3a5f','#5b6878','#3a5a3f','#7a5a18']} />
        </TweakSection>
        <TweakSection label="Typography">
          <TweakRadio label="Heading style" value={t.headingFont} onChange={(v) => setTweak('headingFont', v)} options={[{ value: 'Cormorant Garamond', label: 'Serif' }, { value: 'Inter', label: 'Sans' }]} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
